<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kehribar — Bakımda</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #2d353b;
    --bg-dark: #232a2e;
    --bg-light: #343f44;
    --text: #d3c6aa;
    --text-dim: #859289;
    --green: #a7c080;
    --purple: #d699b6;
    --blue: #7fbbb3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: var(--bg-light);
    border-radius: 14px;
    padding: 2.5rem 2.5rem;
    text-align: center;
    max-width: 440px;
    width: 90%;
    border: 1px solid rgba(167, 192, 128, 0.15);
  }
  .icon-wrap {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(167, 192, 128, 0.1);
    border: 1px solid rgba(167, 192, 128, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
  }
  .icon {
    font-size: 2rem;
    color: var(--green);
    animation: spin 8s linear infinite;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  h1 {
    font-size: 1.75rem;
    color: var(--green);
    margin-bottom: 0.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .tagline {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }
  .divider {
    border: none;
    border-top: 1px solid rgba(167, 192, 128, 0.12);
    margin: 1.5rem 0;
  }
  .status-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--bg-dark);
    border-radius: 8px;
    padding: 0.875rem 1rem;
    margin-bottom: 0.75rem;
    text-align: left;
  }
  .status-icon {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 0.9rem;
  }
  .status-icon.green { background: rgba(167, 192, 128, 0.15); color: var(--green); }
  .status-icon.purple { background: rgba(214, 153, 182, 0.15); color: var(--purple); }
  .status-icon.blue { background: rgba(127, 187, 179, 0.15); color: var(--blue); }
  .status-label { font-size: 0.8rem; color: var(--text-dim); }
  .status-value { font-size: 0.9rem; color: var(--text); font-weight: 500; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: rgba(167, 192, 128, 0.12);
    color: var(--green);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.3rem 0.85rem;
    border-radius: 99px;
    border: 1px solid rgba(167, 192, 128, 0.2);
    margin-bottom: 1rem;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon-wrap">
    <i class="fas fa-snowflake icon"></i>
  </div>
  <h1>Kehribar</h1>
  <p class="tagline">I use NixOS BTW!</p>
  <div class="badge">
    <div class="dot"></div>
    Bakımda
  </div>

  <hr class="divider">

  <div class="status-row">
    <div class="status-icon green"><i class="fas fa-wrench"></i></div>
    <div>
      <div class="status-label">Durum</div>
      <div class="status-value">Site güncelleniyor</div>
    </div>
  </div>

  <div class="status-row">
    <div class="status-icon purple"><i class="fas fa-snowflake"></i></div>
    <div>
      <div class="status-label">Yakında</div>
      <div class="status-value">NixZONE yazıları & yeni içerikler</div>
    </div>
  </div>

  <div class="status-row">
    <div class="status-icon blue"><i class="fab fa-github"></i></div>
    <div>
      <div class="status-label">Takip et</div>
      <div class="status-value">github.com/dpentx</div>
    </div>
  </div>
</div>
</body>
</html>
