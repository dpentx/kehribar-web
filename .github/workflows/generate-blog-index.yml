name: Generate Blog Index

on:
  push:
    branches:
      - main
    paths:
      - 'data/**'
  workflow_dispatch:

jobs:
  generate-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Generate blog index
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json
          import os
          from pathlib import Path
          from datetime import datetime

          def generate_index():
              result = {
                  "tr": {"blog": {}, "nixzone": {"files": []}},
                  "en": {"blog": {}, "nixzone": {"files": []}},
                  "generated_at": datetime.utcnow().isoformat() + "Z",
                  "cache_bust": int(datetime.utcnow().timestamp())
              }

              for lang in ["tr", "en"]:
                  # Blog
                  blog_path = Path(f"data/{lang}/blog")
                  if blog_path.exists():
                      for md_file in blog_path.rglob("*.md"):
                          relative_path = md_file.relative_to(blog_path)
                          folder_path = str(relative_path.parent)
                          file_name = md_file.name
                          folder_key = "_root" if folder_path == "." else folder_path
                          if folder_key not in result[lang]["blog"]:
                              result[lang]["blog"][folder_key] = {
                                  "files": [],
                                  "path": folder_path if folder_path != "." else ""
                              }
                          result[lang]["blog"][folder_key]["files"].append({
                              "name": file_name,
                              "size": md_file.stat().st_size,
                              "modified": datetime.fromtimestamp(md_file.stat().st_mtime).isoformat() + "Z"
                          })

                  # NixZone
                  nixzone_path = Path(f"data/{lang}/nixzone")
                  if nixzone_path.exists():
                      for md_file in nixzone_path.glob("*.md"):
                          result[lang]["nixzone"]["files"].append({
                              "name": md_file.name,
                              "size": md_file.stat().st_size,
                              "modified": datetime.fromtimestamp(md_file.stat().st_mtime).isoformat() + "Z"
                          })

              # Dosyaları alfabetik sırala
              for lang in ["tr", "en"]:
                  for folder_key in result[lang]["blog"]:
                      result[lang]["blog"][folder_key]["files"].sort(key=lambda x: x["name"])
                  result[lang]["nixzone"]["files"].sort(key=lambda x: x["name"])

              return result

          index_data = generate_index()
          with open("blog-index.json", "w", encoding="utf-8") as f:
              json.dump(index_data, f, ensure_ascii=False, indent=2)

          print("Blog index generated successfully!")
          blog_tr = len(index_data['tr']['blog'])
          blog_en = len(index_data['en']['blog'])
          nix_tr = len(index_data['tr']['nixzone']['files'])
          nix_en = len(index_data['en']['nixzone']['files'])
          print(f"Blog folders: TR={blog_tr}, EN={blog_en}")
          print(f"NixZone files: TR={nix_tr}, EN={nix_en}")
          PYTHON_SCRIPT
          
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add blog-index.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update blog index [skip ci]" && git push)
      
      - name: Purge CDN cache
        run: |
          for i in {1..3}; do
            echo "Attempt $i: Purging blog-index.json"
            curl -X POST "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/blog-index.json"
            sleep 2
          done

          echo "Purging data directory"
          curl -X POST "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/data/"
          sleep 3
          curl -X POST "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/data/tr/"
          curl -X POST "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/data/en/"
