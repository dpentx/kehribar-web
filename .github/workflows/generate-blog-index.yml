name: Generate Blog Index

on:
  push:
    branches:
      - main
    paths:
      - 'blog/**'
  workflow_dispatch:

jobs:
  generate-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Bu satır eklendi
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Bu satır eklendi
        
      - name: Generate blog index
        run: |
          # Python ile JSON üret (özel karakterleri düzgün işler)
          python3 << 'PYTHON_SCRIPT'
          import json
          import os
          from pathlib import Path

          def generate_index():
              result = {"tr": {}, "en": {}}
              
              for lang in ["tr", "en"]:
                  blog_path = Path(f"blog/{lang}")
                  
                  if not blog_path.exists():
                      continue
                  
                  for folder in blog_path.iterdir():
                      if folder.is_dir():
                          folder_name = folder.name
                          md_files = [f.name for f in folder.glob("*.md")]
                          
                          if md_files:
                              result[lang][folder_name] = sorted(md_files)
              
              return result

          # JSON dosyasını oluştur
          index_data = generate_index()
          with open("blog-index.json", "w", encoding="utf-8") as f:
              json.dump(index_data, f, ensure_ascii=False, indent=2)

          print("Blog index generated successfully!")
          PYTHON_SCRIPT
          
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add blog-index.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update blog index [skip ci]" && git push)
      
      - name: Purge CDN cache
        run: |
          sleep 5
          curl -X POST "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/blog-index.json"
